<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSVP - Please Fill by April 5</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: hsl(36, 30%, 96%);
      --foreground: hsl(25, 30%, 15%);
      --card: hsl(40, 40%, 97%);
      --card-foreground: hsl(25, 30%, 15%);
      --primary: hsl(38, 70%, 50%);
      --primary-foreground: hsl(40, 40%, 97%);
      --muted: hsl(36, 20%, 92%);
      --muted-foreground: hsl(25, 15%, 45%);
      --border: hsl(36, 25%, 85%);
      --input: hsl(36, 25%, 85%);
      --gold: hsl(38, 70%, 50%);
      --gold-light: hsl(40, 60%, 70%);
      --gold-dark: hsl(35, 75%, 35%);
      --font-display: 'Cormorant Garamond', serif;
      --font-body: 'Jost', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background: var(--background);
      color: var(--foreground);
      line-height: 1.6;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-display);
    }

    .splash-screen {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--background);
      transition: opacity 0.7s;
    }

    .splash-screen.fade-out {
      opacity: 0;
    }

    .splash-screen img {
      width: 10rem;
      margin-bottom: 1.5rem;
    }

    .splash-screen p {
      font-size: 2rem;
      font-family: var(--font-display);
      font-weight: bold;
      color: var(--primary);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .om-symbol {
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    .ornament-divider span {
      animation: rotate 4s linear infinite;
      display: inline-block;
    }

    .main-content {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .main-content.visible {
      opacity: 1;
    }

    .shimmer {
      width: 100%;
      height: 6px;
      background: linear-gradient(110deg, hsla(38, 70%, 50%, 0) 0%, hsla(38, 70%, 50%, 0.15) 40%, hsla(38, 70%, 50%, 0.3) 50%, hsla(38, 70%, 50%, 0.15) 60%, hsla(38, 70%, 50%, 0) 100%);
      background-size: 200% 100%;
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .container {
      width: 100%;
      max-width: 42rem;
      margin: 0 auto;
      padding: 2.5rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .om-symbol {
      font-size: 2.5rem;
      color: var(--primary);
      margin-bottom: 0.5rem;
      font-family: var(--font-display);
    }

    .title {
      font-size: 2rem;
      font-family: var(--font-display);
      font-weight: bold;
      text-align: center;
      line-height: 1.2;
      color: var(--foreground);
    }

    .text-gradient-gold {
      background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin-top: 0.75rem;
      font-size: 1.25rem;
      font-family: var(--font-display);
      color: var(--muted-foreground);
      text-align: center;
      font-style: italic;
    }

    .subtitle span {
      color: var(--foreground);
      font-weight: 600;
    }

    .ornament-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin: 1.5rem 0;
      width: 100%;
      max-width: 20rem;
    }

    .ornament-divider::before,
    .ornament-divider::after {
      content: '';
      height: 1px;
      flex: 1;
      background: hsla(38, 70%, 50%, 0.3);
    }





    .card {
      width: 100%;
      max-width: 28rem;
      margin: 0 auto;
      background: var(--card);
      border-radius: 0.75rem;
      border: 1px solid var(--border);
      padding: 2rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .card h2 {
      font-size: 1.5rem;
      font-family: var(--font-display);
      font-weight: bold;
      text-align: center;
      color: var(--foreground);
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    label {
      display: block;
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted-foreground);
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      height: 2.5rem;
      border-radius: 0.375rem;
      border: 1px solid var(--input);
      background: var(--background);
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
      color: var(--foreground);
      transition: all 0.2s;
    }

    input:focus {
      outline: none;
      ring: 2px;
      ring-color: var(--primary);
      ring-offset: 2px;
    }

    .error-message {
      color: hsl(0, 84%, 60%);
      font-size: 0.875rem;
      margin-top: 0.25rem;
    }

    button {
      width: 100%;
      padding: 1.5rem;
      font-size: 1.125rem;
      font-family: var(--font-display);
      font-weight: 600;
      background: var(--primary);
      color: var(--primary-foreground);
      border: none;
      border-radius: 0.375rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover:not(:disabled) {
      background: var(--gold-dark);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .button-outline {
      background: transparent;
      color: var(--foreground);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      font-size: 1rem;
      margin-top: 1.5rem;
    }

    .button-outline:hover {
      background: var(--muted);
    }

    .success-card {
      text-align: center;
    }

    .success-card .emoji {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .success-card p {
      color: var(--muted-foreground);
      font-family: var(--font-body);
    }

    .footer-text {
      margin-top: 2.5rem;
      font-size: 0.875rem;
      color: var(--muted-foreground);
      font-family: var(--font-body);
      text-align: center;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 1rem 1.5rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      z-index: 100;
      animation: slide-in 0.3s ease-out;
      max-width: 20rem;
    }

    .toast.success {
      border-left: 4px solid hsl(142, 76%, 36%);
    }

    .toast.error {
      border-left: 4px solid hsl(0, 84%, 60%);
    }

    @keyframes slide-in {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @media (min-width: 640px) {
      .splash-screen img { width: 13rem; }
      .splash-screen p { font-size: 2.5rem; }
      .title { font-size: 2.5rem; }
    }

    @media (min-width: 768px) {
      .title { font-size: 3rem; }
    }
  </style>
</head>
<body>
  <!-- Splash Screen -->
  <div id="splashScreen" class="splash-screen">
    <img src="./asset/Adobe Express - file.png" alt="Shree Ganesh">
    <p>ॐ श्री गणेशाय नमः</p>
  </div>

  <!-- Main Content -->
  <div id="mainContent" class="main-content">
    <div class="shimmer"></div>

    <main class="container">
      <p class="om-symbol">ॐ</p>

      <h1 class="title">
        Join us for our <span class="text-gradient-gold">Vastu Poojan</span>
      </h1>
      <p class="subtitle">
        with the blessings of <span>Late Ramanbhai Patel & Hasuben Patel</span>
      </p>

      <div class="ornament-divider">
        <span>✦</span>
      </div>

      <!-- RSVP Form -->
      <div id="rsvpForm" class="card">
        <h2>RSVP</h2>
        <form id="form">
          <div class="form-row">
            <div class="form-group">
              <label for="firstName">First Name</label>
              <input type="text" id="firstName" name="firstName" placeholder="First name" required>
              <div id="firstNameError" class="error-message"></div>
            </div>
            <div class="form-group">
              <label for="lastName">Last Name</label>
              <input type="text" id="lastName" name="lastName" placeholder="Last name" required>
              <div id="lastNameError" class="error-message"></div>
            </div>
          </div>
          <div class="form-group">
            <label for="numberOfGuests">Number of Guests</label>
            <input type="number" id="numberOfGuests" name="numberOfGuests" min="1" max="20" value="1" required>
            <div id="guestsError" class="error-message"></div>
          </div>
          <button type="submit" id="submitBtn">Submit RSVP</button>
        </form>
      </div>

      <!-- Success Message -->
      <div id="successCard" class="card success-card" style="display: none;">
        <div class="emoji">🙏</div>
        <h2>Thank You!</h2>
        <p>Your RSVP has been received. We look forward to celebrate with you!</p>
        <button class="button-outline" onclick="resetForm()">Submit Another RSVP</button>
      </div>

      <p class="footer-text">We are excited to welcome you to our new home!</p>
    </main>

    <div class="shimmer"></div>
  </div>

  <script>
    // Splash Screen Logic
    const splashScreen = document.getElementById('splashScreen');
    const mainContent = document.getElementById('mainContent');

    setTimeout(() => {
      splashScreen.classList.add('fade-out');
    }, 2500);

    setTimeout(() => {
      splashScreen.style.display = 'none';
      mainContent.classList.add('visible');
    }, 3200);

    // Toast Notification
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);

      setTimeout(() => {
        toast.style.animation = 'slide-in 0.3s ease-out reverse';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // Form Validation & Submission
    const form = document.getElementById('form');
    const rsvpForm = document.getElementById('rsvpForm');
    const successCard = document.getElementById('successCard');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Clear previous errors
      document.querySelectorAll('.error-message').forEach(el => el.textContent = '');

      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const numberOfGuests = parseInt(document.getElementById('numberOfGuests').value);

      // Validation
      let isValid = true;

      if (!firstName || firstName.length > 50) {
        document.getElementById('firstNameError').textContent = 'First name is required';
        isValid = false;
      }

      if (!lastName || lastName.length > 50) {
        document.getElementById('lastNameError').textContent = 'Last name is required';
        isValid = false;
      }

      if (numberOfGuests < 1 || numberOfGuests > 20) {
        document.getElementById('guestsError').textContent = 'Between 1 and 20 guests';
        isValid = false;
      }

      if (!isValid) return;

      // Submit form
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting...';

      try {
        const formData = new FormData();
        formData.append('First Name', firstName);
        formData.append('Last Name', lastName);
        formData.append('Number of Guests', numberOfGuests);
        formData.append('_subject', `RSVP from ${firstName} ${lastName}`);
        formData.append('_captcha', 'false');

        const response = await fetch('https://formsubmit.co/ajax/dilvipatel3911@gmail.com', {
          method: 'POST',
          body: formData
        });

        if (response.ok) {
          showToast(`Thank you, ${firstName}! Your RSVP for ${numberOfGuests} guest(s) has been received.`, 'success');
          rsvpForm.style.display = 'none';
          successCard.style.display = 'block';
        } else {
          showToast('Something went wrong. Please try again.', 'error');
        }
      } catch (error) {
        showToast('Failed to submit. Please check your connection and try again.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit RSVP';
      }
    });

    function resetForm() {
      form.reset();
      rsvpForm.style.display = 'block';
      successCard.style.display = 'none';
      document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
    }
  </script>
</body>
</html>
